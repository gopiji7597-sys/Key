<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Answer Checker - Admin + Student</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header with Admin Button */
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        /* Main Card */
        .main-card {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Login Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .password-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .password-input:focus {
            border-color: #667eea;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .error-msg {
            color: #dc3545;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }

        /* Admin Panel (Hidden by Default) */
        .admin-panel {
            display: none;
            margin-top: 30px;
            border-top: 3px solid #667eea;
            padding-top: 30px;
        }

        .admin-panel.active {
            display: block;
            animation: slideDown 0.5s;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .admin-header h2 {
            color: #667eea;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Student Progress Steps */
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 3px;
            background: #e0e0e0;
            transform: translateY(-50%);
            z-index: 1;
        }

        .step {
            width: 50px;
            height: 50px;
            background: white;
            border: 3px solid #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #999;
            position: relative;
            z-index: 2;
        }

        .step.active {
            border-color: #667eea;
            color: #667eea;
        }

        .step.completed {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .step-label {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #666;
            white-space: nowrap;
        }

        /* Selection Section */
        .selection-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .select-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .select-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        /* Answer Grid */
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .answer-item {
            background: white;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .answer-item select {
            width: 100%;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .check-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
        }

        /* Result Card */
        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf1 100%);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            border: 3px solid #667eea;
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .count-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            margin: 5px;
        }

        .count-badge.correct {
            background: #d4edda;
            color: #28a745;
        }

        .count-badge.wrong {
            background: #f8d7da;
            color: #dc3545;
        }

        .count-badge.unattempted {
            background: #fff3cd;
            color: #ffc107;
        }

        /* Admin Form Styles */
        .admin-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .quick-fill-options {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .quick-fill-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        .quick-fill-btn:hover {
            background: #667eea;
            color: white;
        }

        .data-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Admin Button -->
        <div class="header">
            <h1>📝 Exam Answer Checker</h1>
            <button class="admin-btn" onclick="openLoginModal()">
                🔐 Admin Panel
            </button>
        </div>

        <!-- Main Content -->
        <div class="main-card">
            <!-- Student Section (Always Visible) -->
            <div id="studentSection">
                <!-- Progress Steps -->
                <div class="progress-steps">
                    <div class="step active" id="step1">1<span class="step-label">Exam</span></div>
                    <div class="step" id="step2">2<span class="step-label">Shift</span></div>
                    <div class="step" id="step3">3<span class="step-label">Answers</span></div>
                    <div class="step" id="step4">4<span class="step-label">Result</span></div>
                </div>

                <!-- Selection Section -->
                <div class="selection-section">
                    <div class="select-group">
                        <label>📚 परीक्षा चुनें:</label>
                        <select id="examSelect" onchange="onExamChange()">
                            <option value="">-- Select Exam --</option>
                        </select>
                    </div>
                    <div class="select-group">
                        <label>⏰ Shift चुनें:</label>
                        <select id="shiftSelect" onchange="onShiftChange()" disabled>
                            <option value="">-- First select exam --</option>
                        </select>
                    </div>
                </div>

                <!-- Answers Section -->
                <div class="answers-section" id="answersSection" style="display: none;">
                    <h3>✏️ अपने Answers चुनें</h3>
                    <div class="answers-grid" id="answersGrid"></div>
                    <button class="check-btn" onclick="checkAnswers()">🔍 मेरा Result देखें</button>
                </div>

                <!-- Result Card -->
                <div class="result-card" id="resultCard">
                    <h2 style="text-align: center;">🎉 आपका परिणाम</h2>
                    <div class="result-stats">
                        <div class="stat-card">
                            <div class="stat-value" id="accuracy">0%</div>
                            <div>सटीकता</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="rank">#0</div>
                            <div>रैंक</div>
                        </div>
                    </div>
                    <div style="text-align: center; margin: 20px 0;">
                        <span class="count-badge correct" id="correctCount">✅ सही: 0</span>
                        <span class="count-badge wrong" id="wrongCount">❌ गलत: 0</span>
                        <span class="count-badge unattempted" id="unattemptedCount">⭕ छोड़े: 0</span>
                    </div>
                    <button class="new-check" onclick="resetForNewCheck()" style="width: 100%; padding: 15px; background: #f0f0f0; border: none; border-radius: 10px; cursor: pointer;">🔄 नया Check करें</button>
                </div>
            </div>

            <!-- Admin Panel (Hidden by Default) -->
            <div class="admin-panel" id="adminPanel">
                <div class="admin-header">
                    <h2>👑 Admin Control Panel</h2>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>

                <!-- Admin Forms -->
                <div class="admin-form">
                    <h3>📝 Add New Exam</h3>
                    <div class="form-group">
                        <label>Exam Name:</label>
                        <input type="text" id="examName" placeholder="e.g., UPSC Prelims 2024">
                    </div>
                    <div class="form-group">
                        <label>Exam Date:</label>
                        <input type="date" id="examDate">
                    </div>
                    <div class="form-group">
                        <label>Total Questions:</label>
                        <input type="number" id="totalQuestions" value="75">
                    </div>
                    <button class="admin-btn" onclick="addExam()">➕ Create Exam</button>
                </div>

                <div class="admin-form">
                    <h3>⏰ Add Shift & Sets</h3>
                    <div class="form-group">
                        <label>Select Exam:</label>
                        <select id="adminExamSelect">
                            <option value="">-- Select exam --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Shift Number:</label>
                        <input type="number" id="shiftNumber" value="1">
                    </div>
                    <div class="form-group">
                        <label>Shift Timing:</label>
                        <input type="text" id="shiftTime" placeholder="9:00 AM - 12:00 PM">
                    </div>
                    <div class="form-group">
                        <label>Number of Sets:</label>
                        <input type="number" id="setCount" value="4" min="1" max="24">
                    </div>
                    <button class="admin-btn" onclick="addShift()">➕ Add Shift</button>
                </div>

                <div class="admin-form">
                    <h3>🔑 Add Answer Keys</h3>
                    <div class="form-group">
                        <label>Select Set:</label>
                        <select id="keySetSelect">
                            <option value="">-- First add exam & shift --</option>
                        </select>
                    </div>
                    
                    <div class="quick-fill-options">
                        <div class="quick-fill-btn" onclick="quickFillAll('A')">All A</div>
                        <div class="quick-fill-btn" onclick="quickFillAll('B')">All B</div>
                        <div class="quick-fill-btn" onclick="quickFillAll('C')">All C</div>
                        <div class="quick-fill-btn" onclick="quickFillAll('D')">All D</div>
                        <div class="quick-fill-btn" onclick="quickFillRandom()">Random</div>
                    </div>

                    <div class="answers-grid" id="adminAnswerGrid" style="max-height: 300px;"></div>
                    <button class="admin-btn" onclick="saveAnswerKey()" style="margin-top: 15px;">💾 Save Answer Key</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2>🔐 Admin Login</h2>
            <input type="password" class="password-input" id="passwordInput" placeholder="Enter password" onkeypress="if(event.key==='Enter') checkPassword()">
            <button class="login-btn" onclick="checkPassword()">Login</button>
            <div class="error-msg" id="loginError">Wrong password! Try again.</div>
        </div>
    </div>

    <script>
        // ==================== DATA STRUCTURE ====================
        let examData = {
            exams: [],
            shifts: [],
            sets: [],
            answerKeys: []
        };

        const ADMIN_PASSWORD = "Shoorveer@4638";
        let totalQuestions = 75;

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem('examData');
            if (saved) {
                examData = JSON.parse(saved);
            }
            updateStudentDropdowns();
            updateAdminDropdowns();
        }

        // Save data
        function saveData() {
            localStorage.setItem('examData', JSON.stringify(examData));
            updateStudentDropdowns();
            updateAdminDropdowns();
        }

        // ==================== LOGIN FUNCTIONS ====================
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            if (password === ADMIN_PASSWORD) {
                closeLoginModal();
                document.getElementById('adminPanel').classList.add('active');
                updateAdminDropdowns();
                generateAdminAnswerGrid();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('adminPanel').classList.remove('active');
        }

        // ==================== ADMIN FUNCTIONS ====================
        function addExam() {
            const name = document.getElementById('examName').value;
            const date = document.getElementById('examDate').value;
            const totalQ = parseInt(document.getElementById('totalQuestions').value);

            if (!name || !date) return alert('Fill all fields');

            examData.exams.push({
                id: 'exam_' + Date.now(),
                name: name,
                date: date,
                totalQuestions: totalQ
            });

            saveData();
            document.getElementById('examName').value = '';
            document.getElementById('examDate').value = '';
        }

        function addShift() {
            const examId = document.getElementById('adminExamSelect').value;
            const shiftNumber = parseInt(document.getElementById('shiftNumber').value);
            const shiftTime = document.getElementById('shiftTime').value;
            const setCount = parseInt(document.getElementById('setCount').value);

            if (!examId || !shiftTime) return alert('Fill all fields');

            const shiftId = 'shift_' + Date.now();
            examData.shifts.push({
                id: shiftId,
                examId: examId,
                shiftNumber: shiftNumber,
                time: shiftTime
            });

            // Generate sets
            for (let i = 0; i < setCount; i++) {
                examData.sets.push({
                    id: `set_${shiftId}_${String.fromCharCode(65 + i)}`,
                    shiftId: shiftId,
                    setCode: String.fromCharCode(65 + i)
                });
            }

            saveData();
            document.getElementById('shiftTime').value = '';
        }

        function generateAdminAnswerGrid() {
            const grid = document.getElementById('adminAnswerGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= totalQuestions; i++) {
                grid.innerHTML += `
                    <div class="answer-item">
                        <label>Q${i}</label>
                        <select id="admin_ans_${i}">
                            <option value="">-</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                `;
            }
        }

        function quickFillAll(option) {
            for (let i = 1; i <= totalQuestions; i++) {
                const select = document.getElementById(`admin_ans_${i}`);
                if (select) select.value = option;
            }
        }

        function quickFillRandom() {
            const options = ['A', 'B', 'C', 'D'];
            for (let i = 1; i <= totalQuestions; i++) {
                const select = document.getElementById(`admin_ans_${i}`);
                if (select) {
                    select.value = options[Math.floor(Math.random() * 4)];
                }
            }
        }

        function saveAnswerKey() {
            const setId = document.getElementById('keySetSelect').value;
            if (!setId) return alert('Select a set first');

            const answers = [];
            for (let i = 1; i <= totalQuestions; i++) {
                const select = document.getElementById(`admin_ans_${i}`);
                answers.push(select?.value || '');
            }

            const existingIndex = examData.answerKeys.findIndex(k => k.setId === setId);
            if (existingIndex >= 0) {
                examData.answerKeys[existingIndex].answers = answers;
            } else {
                examData.answerKeys.push({
                    id: 'key_' + Date.now(),
                    setId: setId,
                    answers: answers
                });
            }

            saveData();
            alert('Answer key saved!');
        }

        // ==================== STUDENT FUNCTIONS ====================
        function updateStudentDropdowns() {
            const examSelect = document.getElementById('examSelect');
            examSelect.innerHTML = '<option value="">-- Select Exam --</option>';
            examData.exams.forEach(exam => {
                examSelect.innerHTML += `<option value="${exam.id}">${exam.name}</option>`;
            });
        }

        function updateAdminDropdowns() {
            const adminExamSelect = document.getElementById('adminExamSelect');
            adminExamSelect.innerHTML = '<option value="">-- Select exam --</option>';
            examData.exams.forEach(exam => {
                adminExamSelect.innerHTML += `<option value="${exam.id}">${exam.name}</option>`;
            });

            // Update set dropdown
            const setSelect = document.getElementById('keySetSelect');
            setSelect.innerHTML = '<option value="">-- Select set --</option>';
            examData.sets.forEach(set => {
                const shift = examData.shifts.find(s => s.id === set.shiftId);
                const exam = examData.exams.find(e => e.id === shift?.examId);
                setSelect.innerHTML += `<option value="${set.id}">${exam?.name} - Shift ${shift?.shiftNumber} - Set ${set.setCode}</option>`;
            });
        }

        function onExamChange() {
            const examId = document.getElementById('examSelect').value;
            if (!examId) return;

            const exam = examData.exams.find(e => e.id === examId);
            totalQuestions = exam.totalQuestions;

            const shiftSelect = document.getElementById('shiftSelect');
            shiftSelect.disabled = false;
            shiftSelect.innerHTML = '<option value="">-- Select Shift --</option>';
            
            examData.shifts.filter(s => s.examId === examId).forEach(shift => {
                shiftSelect.innerHTML += `<option value="${shift.id}">Shift ${shift.shiftNumber}</option>`;
            });
        }

        function onShiftChange() {
            document.getElementById('answersSection').style.display = 'block';
            generateStudentAnswerGrid();
        }

        function generateStudentAnswerGrid() {
            const grid = document.getElementById('answersGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= totalQuestions; i++) {
                grid.innerHTML += `
                    <div class="answer-item">
                        <label>Q${i}</label>
                        <select id="student_ans_${i}">
                            <option value="">-</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                `;
            }
        }

        function checkAnswers() {
            const shiftId = document.getElementById('shiftSelect').value;
            const studentAnswers = [];
            
            for (let i = 1; i <= totalQuestions; i++) {
                studentAnswers.push(document.getElementById(`student_ans_${i}`)?.value || '');
            }

            // Find best matching set
            let bestMatch = { correctCount: 0, matchPercent: 0 };
            const sets = examData.sets.filter(s => s.shiftId === shiftId);
            
            sets.forEach(set => {
                const key = examData.answerKeys.find(k => k.setId === set.id);
                if (!key) return;

                let correct = 0;
                for (let i = 0; i < totalQuestions; i++) {
                    if (studentAnswers[i] && key.answers[i] && studentAnswers[i] === key.answers[i]) {
                        correct++;
                    }
                }
                
                const percent = (correct / totalQuestions) * 100;
                if (percent > bestMatch.matchPercent) {
                    bestMatch = { correctCount: correct, matchPercent: percent, set: set };
                }
            });

            // Calculate stats
            const accuracy = bestMatch.matchPercent.toFixed(1);
            const rank = Math.floor(Math.random() * 1000) + 1;
            
            // Count correct/wrong/unattempted
            let correct = 0, wrong = 0, unattempted = 0;
            studentAnswers.forEach(a => {
                if (!a) unattempted++;
                else if (a === bestMatch.set?.correctAnswer) correct++;
                else wrong++;
            });

            // Update display
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('rank').textContent = '#' + rank;
            document.getElementById('correctCount').innerHTML = `✅ सही: ${correct}`;
            document.getElementById('wrongCount').innerHTML = `❌ गलत: ${wrong}`;
            document.getElementById('unattemptedCount').innerHTML = `⭕ छोड़े: ${unattempted}`;
            
            document.getElementById('resultCard').classList.add('show');
        }

        function resetForNewCheck() {
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('answersSection').style.display = 'none';
            document.getElementById('examSelect').value = '';
            document.getElementById('shiftSelect').innerHTML = '<option value="">-- First select exam --</option>';
            document.getElementById('shiftSelect').disabled = true;
        }

        // Initialize
        window.onload = function() {
            loadData();
            document.getElementById('examDate').value = new Date().toISOString().split('T')[0];
        };
    </script>
</body>
</html>
